<div class="overview p-3">
  @if (hasPermissionToUpdateOwnAccessToken) {
    <div class="mb-4">
      <h2 class="section-title" i18n>Security Token</h2>
      <div class="dashboard-card">
        <form
          class="w-100"
          [formGroup]="updateOwnAccessTokenForm"
          (ngSubmit)="onGenerateAccessToken()"
        >
          <div class="align-items-center d-flex justify-content-center">
            <mat-form-field
              appearance="outline"
              class="without-hint w-50"
              [hideRequiredMarker]="true"
            >
              <mat-label i18n>Security Token</mat-label>
              <input
                formControlName="accessToken"
                matInput
                [type]="isAccessTokenHidden ? 'password' : 'text'"
              />
              <button
                class="mx-2"
                mat-icon-button
                matSuffix
                type="button"
                (click)="isAccessTokenHidden = !isAccessTokenHidden"
              >
                <ion-icon
                  class="mat-icon"
                  [name]="
                    isAccessTokenHidden ? 'eye-outline' : 'eye-off-outline'
                  "
                />
              </button>
            </mat-form-field>
            <div class="ps-2">
              <button
                color="warn"
                mat-flat-button
                type="submit"
                [disabled]="
                  !(
                    updateOwnAccessTokenForm.dirty &&
                    updateOwnAccessTokenForm.valid
                  )
                "
              >
                <span i18n>Generate</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  }

  @if (accessesGet.length > 0) {
    <div class="mb-4">
      <h2 class="section-title" i18n>Received Access</h2>
      <gf-access-table [accesses]="accessesGet" [user]="user" />
    </div>
  }

  <div class="mb-4">
    <h2 class="section-title align-items-center d-flex">
      <span i18n>Granted Access</span>
      @if (user?.subscription?.type === 'Basic') {
        <gf-premium-indicator class="ms-1" />
      }
    </h2>
    <gf-access-table
      [accesses]="accessesGive"
      [showActions]="hasPermissionToDeleteAccess"
      [user]="user"
      (accessDeleted)="onDeleteAccess($event)"
      (accessToUpdate)="onUpdateAccess($event)"
    />
  </div>

  @if (hasPermissionToCreateAccess) {
    <gf-fab [queryParams]="{ createDialog: true }" />
  }
</div>
