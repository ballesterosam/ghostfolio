<div class="d-flex align-items-center w-100" mat-dialog-actions>
  <ng-content />
</div>

@if (deviceType === 'mobile') {
  <div class="d-flex justify-content-center mt-2" mat-dialog-actions>
    <button mat-button (click)="onClickCloseButton()">
      <ion-icon name="close" size="large" />
    </button>
  </div>
}
